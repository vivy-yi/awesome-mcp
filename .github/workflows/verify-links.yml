name: Verify Links
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        run: |
          npm install -g markdown-link-check
          find . -name "README*.md" -exec markdown-link-check {} \;
